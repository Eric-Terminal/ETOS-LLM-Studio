<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            var lang = navigator.language || navigator.userLanguage; 
            lang = lang.toLowerCase();
            
            if (lang.startsWith('zh-tw') || lang.startsWith('zh-hk')) {
                window.location.href = 'zh_hant.html';
            } else if (lang.startsWith('zh')) {
                window.location.href = 'zh_hans.html';
            } else if (lang.startsWith('ja')) {
                window.location.href = 'ja.html';
            } else if (lang.startsWith('es')) {
                window.location.href = 'es.html';
            } else if (lang.startsWith('fr')) {
                window.location.href = 'fr.html';
            } else if (lang.startsWith('ru')) {
                window.location.href = 'ru.html';
            } else if (lang.startsWith('ar')) {
                window.location.href = 'ar.html';
            } else {
                window.location.href = 'en.html';
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="en.html">Privacy Policy</a>...</p>
    <p><a href="zh_hans.html">简体中文</a> | <a href="zh_hant.html">繁體中文</a> | <a href="ja.html">日本語</a> | <a href="es.html">Español</a> | <a href="fr.html">Français</a> | <a href="ru.html">Русский</a> | <a href="ar.html">العربية</a></p>
</body>
</html>
