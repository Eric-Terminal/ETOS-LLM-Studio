<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            var preferredLanguages = [];
            if (Array.isArray(navigator.languages) && navigator.languages.length > 0) {
                preferredLanguages = navigator.languages;
            } else {
                preferredLanguages = [navigator.language || navigator.userLanguage || ''];
            }

            var normalizedLanguages = preferredLanguages
                .filter(Boolean)
                .map(function(lang) { return String(lang).toLowerCase(); });

            function routeForLanguage(lang) {
                if (!lang) return null;

                if (
                    lang.startsWith('zh-tw') ||
                    lang.startsWith('zh-hk') ||
                    lang.startsWith('zh-mo') ||
                    lang.startsWith('zh-hant')
                ) {
                    return 'zh_hant.html';
                }
                if (lang.startsWith('zh')) return 'zh_hans.html';
                if (lang.startsWith('ja')) return 'ja.html';
                if (lang.startsWith('es')) return 'es.html';
                if (lang.startsWith('fr')) return 'fr.html';
                if (lang.startsWith('ru')) return 'ru.html';
                if (lang.startsWith('ar')) return 'ar.html';
                if (lang.startsWith('en')) return 'en.html';
                return null;
            }

            var target = 'en.html';
            for (var i = 0; i < normalizedLanguages.length; i++) {
                var matched = routeForLanguage(normalizedLanguages[i]);
                if (matched) {
                    target = matched;
                    break;
                }
            }

            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="en.html">Privacy Policy</a>...</p>
    <p><a href="zh_hans.html">简体中文</a> | <a href="zh_hant.html">繁體中文</a> | <a href="ja.html">日本語</a> | <a href="es.html">Español</a> | <a href="fr.html">Français</a> | <a href="ru.html">Русский</a> | <a href="ar.html">العربية</a></p>
</body>
</html>
